<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Registro Sorteo SuiLatam | Únete a la Comunidad</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <meta name="description" content="Registrate en el sorteo oficial de SuiLatam y únete a la comunidad latina de blockchain Sui">
  
  <!-- Favicon -->
  <link href="https://res.cloudinary.com/das1ozwma/image/upload/v1748645630/WhatsApp_Image_2025-05-30_at_19.28.29-removebg-preview_w20ozk.png" rel="shortcut icon" type="image/png" sizes="32x32">
  <link href="https://res.cloudinary.com/das1ozwma/image/upload/v1748645630/WhatsApp_Image_2025-05-30_at_19.28.29-removebg-preview_w20ozk.png" rel="apple-touch-icon">
  
  <!-- CSS -->
  <link href="css/suilatam.css" rel="stylesheet" type="text/css">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* Estilos específicos para la página de registro */
    .registro-section {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    
    .registro-container {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 20px;
      padding: 3rem;
      max-width: 600px;
      width: 100%;
      border: 1px solid rgba(79, 142, 224, 0.3);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
    }
    
    .registro-header {
      text-align: center;
      margin-bottom: 3rem;
      border-bottom: 1px solid rgba(79, 142, 224, 0.2);
      padding-bottom: 2rem;
    }
    
    .registro-logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 1.5rem;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(79, 142, 224, 0.3);
    }
    
    .registro-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .registro-title {
      color: #4F8EE0;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
      line-height: 1.2;
    }
    
    .registro-subtitle {
      color: #a0aec0;
      font-size: 1.2rem;
      margin-bottom: 1rem;
    }
    
    .registro-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(135deg, #4F8EE0, #3b82f6);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
    }
    
    .form-group {
      margin-bottom: 2rem;
    }
    
    .form-group label {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: #e2e8f0;
      font-weight: 600;
      margin-bottom: 0.75rem;
      font-size: 1.1rem;
    }
    
    .form-group label i {
      color: #4F8EE0;
      width: 24px;
      font-size: 1.2rem;
    }
    
    .form-input {
      width: 100%;
      background: rgba(30, 41, 59, 0.8);
      border: 2px solid rgba(79, 142, 224, 0.3);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      color: #f1f5f9;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      height: 60px;
      box-sizing: border-box;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #4F8EE0;
      box-shadow: 0 0 0 4px rgba(79, 142, 224, 0.2);
      background: rgba(30, 41, 59, 0.95);
    }
    
    .form-input::placeholder {
      color: #64748b;
    }
    
    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #4F8EE0, #3b82f6);
      border: none;
      border-radius: 12px;
      padding: 1.25rem;
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }
    
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(59, 130, 246, 0.5);
    }
    
    .submit-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }
    
    .success-message {
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      color: white;
      margin-top: 2rem;
      display: none;
    }
    
    .success-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: bounce 1s ease-out;
    }
    
    @keyframes bounce {
      0%, 20%, 60%, 100% { transform: translateY(0); }
      40% { transform: translateY(-20px); }
      80% { transform: translateY(-10px); }
    }
    
    .info-cards {
      display: grid;
      gap: 1rem;
      margin-top: 2rem;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }
    
    .info-card {
      background: rgba(79, 142, 224, 0.1);
      border: 1px solid rgba(79, 142, 224, 0.2);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    
    .info-card-number {
      color: #4F8EE0;
      font-size: 1.5rem;
      font-weight: 700;
    }
    
    .info-card-label {
      color: #a0aec0;
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }
    
    @media (max-width: 768px) {
      .registro-container {
        padding: 2rem 1.5rem;
        margin: 1rem;
      }
      
      .registro-title {
        font-size: 2rem;
      }
      
      .form-input, .submit-btn {
        height: 55px;
      }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <img src="https://res.cloudinary.com/das1ozwma/image/upload/v1748645630/WhatsApp_Image_2025-05-30_at_19.28.29-removebg-preview_w20ozk.png" alt="SuiLatam Logo" class="logo-img">
        <span class="logo-text">SuiLatam</span>
      </div>
      
      <div class="nav-menu">
        <a href="index.html" class="nav-link">
          <i class="fas fa-home"></i>
          Inicio
        </a>
      </div>
    </div>
  </nav>

  <!-- Registro Section -->
  <section class="registro-section">
    <div class="registro-container">
      <div class="registro-header">
        <div class="registro-logo">
          <img src="https://res.cloudinary.com/das1ozwma/image/upload/v1748645630/WhatsApp_Image_2025-05-30_at_19.28.29-removebg-preview_w20ozk.png" alt="SuiLatam">
        </div>
        
        <h1 class="registro-title">¡Únete al Sorteo!</h1>
        <p class="registro-subtitle">Regístrate en la comunidad SuiLatam y participa</p>
        
        <div class="registro-badge">
          <i class="fas fa-gift"></i>
          Sorteo Oficial SuiLatam
        </div>
        
        <div class="info-cards">
          <div class="info-card">
            <div class="info-card-number">2,500+</div>
            <div class="info-card-label">Miembros</div>
          </div>
          <div class="info-card">
            <div class="info-card-number">15+</div>
            <div class="info-card-label">Países</div>
          </div>
          <div class="info-card">
            <div class="info-card-number">100%</div>
            <div class="info-card-label">En Español</div>
          </div>
        </div>
      </div>

      <form id="raffleForm">
        <div class="form-group">
          <label for="name">
            <i class="fas fa-user"></i>
            Nombre Completo
          </label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            class="form-input" 
            placeholder="Tu nombre completo"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">
            <i class="fas fa-envelope"></i>
            Correo Electrónico
          </label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            class="form-input" 
            placeholder="tucorreo@ejemplo.com"
            required
          >
        </div>

        <div class="form-group">
          <label for="wallet">
            <i class="fas fa-wallet"></i>
            Dirección de Wallet SUI
          </label>
          <input 
            type="text" 
            id="wallet" 
            name="wallet" 
            class="form-input" 
            placeholder="0x123abcd..."
            required
          >
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          <i class="fas fa-rocket"></i>
          Registrarme en el Sorteo
        </button>
      </form>

      <div class="success-message" id="success-message">
        <div class="success-icon">
          <i class="fas fa-check-circle"></i>
        </div>
        <h2>¡Registro Exitoso!</h2>
        <p>Ya estás participando en el sorteo de SuiLatam</p>
      </div>
    </div>
  </section>

  <!-- Scripts -->
  <script src="js/contest-data.js"></script>
  <script src="js/supabase-data.js"></script>

  <script>
    // Inicializar sistema de datos
    const dataManager = new SupabaseDataManager();

    document.getElementById('raffleForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(e.target);
        const participantInfo = {
            name: formData.get('name').trim(),
            email: formData.get('email').trim(),
            wallet: formData.get('wallet').trim()
        };
        
        // Validaciones
        if (!participantInfo.name || participantInfo.name.length < 2) {
            alert('❌ El nombre debe tener al menos 2 caracteres.');
            return;
        }
        
        if (!participantInfo.email || !participantInfo.email.includes('@')) {
            alert('❌ El email no es válido.');
            return;
        }
        
        if (!participantInfo.wallet || participantInfo.wallet.length < 10) {
            alert('❌ La dirección de wallet debe ser válida.');
            return;
        }
        
        // Verificar duplicados
        const participants = dataManager.getParticipants();
        const isDuplicate = participants.some(p => 
            p.email.toLowerCase() === participantInfo.email.toLowerCase() ||
            p.wallet === participantInfo.wallet
        );
        
        if (isDuplicate) {
            alert('⚠️ Este email o wallet ya está registrado.');
            return;
        }
        
        // Mostrar loading
        const submitBtn = e.target.querySelector('button[type="submit"]');
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registrando...';
        submitBtn.disabled = true;
        
        try {
            // Guardar participante con nuevo sistema
            const result = await dataManager.captureParticipant(participantInfo);
            
            if (result) {
                // Limpiar formulario
                e.target.reset();
                
                // Mostrar mensaje de éxito
                const successDiv = document.createElement('div');
                successDiv.innerHTML = `
                    <div class="success-animation" style="
                        background: linear-gradient(135deg, #22c55e, #16a34a);
                        color: white;
                        padding: 2rem;
                        border-radius: 15px;
                        text-align: center;
                        margin: 2rem 0;
                        animation: slideInUp 0.5s ease;
                    ">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">🎉</div>
                        <h3>¡Registro Exitoso!</h3>
                        <p style="margin: 1rem 0;">Tu participación ha sido confirmada</p>
                        <div style="
                            background: rgba(255,255,255,0.2);
                            padding: 1rem;
                            border-radius: 10px;
                            margin-top: 1rem;
                            font-family: monospace;
                        ">
                            <div><strong>Nombre:</strong> ${participantInfo.name}</div>
                            <div><strong>Email:</strong> ${participantInfo.email}</div>
                            <div><strong>Wallet:</strong> ${participantInfo.wallet.substring(0, 15)}...</div>
                            <div><strong>ID:</strong> ${result.id}</div>
                        </div>
                        <p style="margin-top: 1rem; opacity: 0.9;">
                            ✅ <strong>Datos sincronizados globalmente</strong>
                        </p>
                    </div>
                `;
                
                const formContainer = document.querySelector('.form-container');
                formContainer.appendChild(successDiv);
                
                // Auto-scroll a éxito
                successDiv.scrollIntoView({ behavior: 'smooth' });
                
                // Remover mensaje después de 8 segundos
                setTimeout(() => {
                    if (formContainer.contains(successDiv)) {
                        successDiv.style.animation = 'slideOutDown 0.5s ease';
                        setTimeout(() => {
                            if (formContainer.contains(successDiv)) {
                                formContainer.removeChild(successDiv);
                            }
                        }, 500);
                    }
                }, 8000);
                
            } else {
                throw new Error('Error procesando registro');
            }
            
        } catch (error) {
            console.error('Error:', error);
            alert('❌ Error al procesar el registro. Intenta de nuevo.');
        } finally {
            // Restaurar botón
            submitBtn.innerHTML = originalText;
            submitBtn.disabled = false;
        }
    });

    // Validación en tiempo real
    document.getElementById('wallet').addEventListener('input', function(e) {
        const wallet = e.target.value;
        const feedback = document.getElementById('walletFeedback') || createFeedbackElement(e.target);
        
        if (wallet.length === 0) {
            feedback.textContent = '';
            feedback.className = 'feedback';
        } else if (wallet.length < 10) {
            feedback.textContent = '⚠️ Muy corta';
            feedback.className = 'feedback warning';
        } else if (wallet.startsWith('0x') && wallet.length >= 42) {
            feedback.textContent = '✅ Wallet válida';
            feedback.className = 'feedback success';
        } else if (wallet.length >= 20) {
            feedback.textContent = '✅ Formato correcto';
            feedback.className = 'feedback success';
        } else {
            feedback.textContent = '⏳ Continúa escribiendo...';
            feedback.className = 'feedback info';
        }
    });

    function createFeedbackElement(input) {
        const feedback = document.createElement('div');
        feedback.id = input.id + 'Feedback';
        feedback.className = 'feedback';
        input.parentNode.appendChild(feedback);
        return feedback;
    }

    // Escuchar actualizaciones de datos
    window.addEventListener('participantAdded', function(e) {
        console.log('🎉 Nuevo participante añadido:', e.detail);
    });

    window.addEventListener('dataUpdated', function() {
        console.log('🔄 Datos actualizados desde otra pestaña');
    });

    // CSS para animaciones
    const style = document.createElement('style');
    style.textContent = `
        @keyframes slideInUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes slideOutDown {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(30px);
                opacity: 0;
            }
        }
        
        .feedback {
            font-size: 0.8rem;
            margin-top: 0.5rem;
            padding: 0.25rem 0;
        }
        
        .feedback.success { color: #22c55e; }
        .feedback.warning { color: #f59e0b; }
        .feedback.error { color: #ef4444; }
        .feedback.info { color: #3b82f6; }
    `;
    document.head.appendChild(style);

    console.log('✅ Sistema de registro sincronizado inicializado');
  </script>
</body>
</html>
