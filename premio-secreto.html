<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>🌟 Premio Secreto - SuiLatam</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Press+Start+2P&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* === MARIO BROS SECRET THEME === */
    :root {
      --mario-red: #e74c3c;
      --mario-blue: #3498db;
      --mario-yellow: #f1c40f;
      --mario-green: #2ecc71;
      --mario-orange: #e67e22;
      --mario-purple: #9b59b6;
      --star-gold: #ffd700;
      --star-shine: #fff9c4;
      --bg-dark: #0a0a0a;
      --text-light: #ffffff;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Press Start 2P', monospace;
      background: linear-gradient(45deg, #1a1a2e, #16213e, #0f3460);
      color: var(--text-light);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    
    /* === MARIO BACKGROUND EFFECTS === */
    .mario-background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      animation: rainbow-shift 8s ease-in-out infinite alternate;
    }
    
    @keyframes rainbow-shift {
      0% { filter: hue-rotate(0deg) saturate(1); }
      25% { filter: hue-rotate(90deg) saturate(1.2); }
      50% { filter: hue-rotate(180deg) saturate(0.8); }
      75% { filter: hue-rotate(270deg) saturate(1.1); }
      100% { filter: hue-rotate(360deg) saturate(1); }
    }
    
    /* === FLOATING STARS === */
    .stars-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    
    .mario-star {
      position: absolute;
      color: var(--star-gold);
      font-size: 2rem;
      animation: star-float 3s ease-in-out infinite;
      text-shadow: 0 0 20px var(--star-shine);
      filter: drop-shadow(0 0 10px var(--star-gold));
    }
    
    .star-1 { top: 10%; left: 15%; animation-delay: 0s; }
    .star-2 { top: 20%; right: 20%; animation-delay: 1s; }
    .star-3 { bottom: 30%; left: 10%; animation-delay: 2s; }
    .star-4 { bottom: 15%; right: 15%; animation-delay: 1.5s; }
    .star-5 { top: 60%; left: 80%; animation-delay: 0.5s; }
    
    @keyframes star-float {
      0%, 100% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 0.8;
      }
      50% {
        transform: translateY(-20px) scale(1.2) rotate(180deg);
        opacity: 1;
      }
    }
    
    /* === MAIN CONTAINER === */
    .secret-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      z-index: 2;
    }
    
    .secret-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 20px;
      padding: 3rem;
      max-width: 500px;
      width: 100%;
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      animation: card-glow 4s ease-in-out infinite alternate;
    }
    
    @keyframes card-glow {
      0% {
        box-shadow: 
          0 20px 60px rgba(0, 0, 0, 0.3),
          0 0 30px rgba(255, 215, 0, 0.2),
          inset 0 1px 0 rgba(255, 255, 255, 0.2);
      }
      100% {
        box-shadow: 
          0 25px 80px rgba(0, 0, 0, 0.4),
          0 0 50px rgba(255, 215, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.3);
      }
    }
    
    .secret-card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(45deg, 
        var(--mario-red), var(--mario-yellow), 
        var(--mario-green), var(--mario-blue), 
        var(--mario-purple), var(--mario-orange));
      background-size: 400% 400%;
      border-radius: 22px;
      z-index: -1;
      animation: rainbow-border 3s ease infinite;
    }
    
    @keyframes rainbow-border {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    
    /* === HEADER === */
    .secret-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .secret-title {
      font-size: 1.5rem;
      color: var(--star-gold);
      margin-bottom: 0.5rem;
      text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.5);
      animation: title-bounce 2s ease-in-out infinite;
    }
    
    @keyframes title-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    .secret-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.5;
    }
    
    /* === FORM STYLES === */
    .secret-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .form-group {
      position: relative;
    }
    
    .form-label {
      display: block;
      font-size: 0.7rem;
      color: var(--star-gold);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .form-input {
      width: 100%;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 215, 0, 0.3);
      border-radius: 10px;
      color: var(--text-light);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }
    
    .form-input:focus {
      outline: none;
      border-color: var(--star-gold);
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
      transform: scale(1.02);
    }
    
    .form-input::placeholder {
      color: rgba(255, 255, 255, 0.5);
      font-style: italic;
    }
    
    /* === MARIO BUTTON === */
    .mario-button {
      background: linear-gradient(135deg, var(--mario-red), var(--mario-orange));
      border: none;
      border-radius: 15px;
      padding: 1.2rem 2rem;
      color: white;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      margin-top: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 
        0 4px 15px rgba(231, 76, 60, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }
    
    .mario-button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 
        0 8px 25px rgba(231, 76, 60, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }
    
    .mario-button:active {
      transform: translateY(0) scale(0.98);
    }
    
    .mario-button::before {
      content: '🌟';
      position: absolute;
      left: -30px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2rem;
      animation: star-slide 2s ease-in-out infinite;
    }
    
    @keyframes star-slide {
      0%, 100% { left: -30px; opacity: 0; }
      50% { left: 50%; opacity: 1; }
    }
    
    /* === FLOATING COINS === */
    .coins-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    .mario-coin {
      position: absolute;
      font-size: 1.5rem;
      color: var(--mario-yellow);
      animation: coin-spin 3s linear infinite;
      filter: drop-shadow(0 0 10px var(--mario-yellow));
    }
    
    .coin-1 { top: 25%; left: 5%; animation-delay: 0s; }
    .coin-2 { top: 15%; right: 10%; animation-delay: 1s; }
    .coin-3 { bottom: 40%; left: 8%; animation-delay: 2s; }
    .coin-4 { bottom: 20%; right: 12%; animation-delay: 1.5s; }
    
    @keyframes coin-spin {
      0% { transform: rotateY(0deg) translateY(0); }
      25% { transform: rotateY(90deg) translateY(-10px); }
      50% { transform: rotateY(180deg) translateY(0); }
      75% { transform: rotateY(270deg) translateY(-10px); }
      100% { transform: rotateY(360deg) translateY(0); }
    }
    
    /* === POWER-UP EFFECTS === */
    .powerup-effect {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, 
        rgba(255, 215, 0, 0.1) 0%, 
        transparent 50%);
      animation: powerup-pulse 2s ease-in-out infinite;
      pointer-events: none;
    }
    
    @keyframes powerup-pulse {
      0%, 100% { 
        opacity: 0.3; 
        transform: scale(1); 
      }
      50% { 
        opacity: 0.6; 
        transform: scale(1.1); 
      }
    }
    
    /* === SUCCESS ANIMATION === */
    .success-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: linear-gradient(135deg, var(--mario-green), var(--mario-blue));
      color: white;
      padding: 2rem;
      border-radius: 15px;
      text-align: center;
      z-index: 1000;
      display: none;
      animation: success-popup 0.5s ease-out;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    
    @keyframes success-popup {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }
    
    /* === RESPONSIVE === */
    @media (max-width: 768px) {
      .secret-card {
        padding: 2rem;
        margin: 1rem;
      }
      
      .secret-title {
        font-size: 1.2rem;
      }
      
      .form-input {
        padding: 0.8rem;
      }
      
      .mario-button {
        padding: 1rem 1.5rem;
        font-size: 0.7rem;
      }
    }
  </style>
</head>

<body>
  <!-- Mario Background -->
  <div class="mario-background"></div>
  
  <!-- Floating Stars -->
  <div class="stars-container">
    <div class="mario-star star-1">⭐</div>
    <div class="mario-star star-2">⭐</div>
    <div class="mario-star star-3">⭐</div>
    <div class="mario-star star-4">⭐</div>
    <div class="mario-star star-5">⭐</div>
  </div>
  
  <!-- Floating Coins -->
  <div class="coins-container">
    <div class="mario-coin coin-1">🪙</div>
    <div class="mario-coin coin-2">🪙</div>
    <div class="mario-coin coin-3">🪙</div>
    <div class="mario-coin coin-4">🪙</div>
  </div>
  
  <!-- Main Container -->
  <div class="secret-container">
    <div class="secret-card">
      <div class="powerup-effect"></div>
      
      <div class="secret-header">
        <h1 class="secret-title">🏆 ¡Premio Secreto Desbloqueado!</h1>
        <p class="secret-subtitle">
          ¡Felicidades! Has encontrado la zona secreta de SuiLatam. 
          Completa tu registro para participar en nuestro premio especial.
        </p>
      </div>
      
      <form class="secret-form" id="secretForm">
        <div class="form-group">
          <label class="form-label" for="nombre">🎮 Nombre del Jugador</label>
          <input 
            type="text" 
            id="nombre" 
            name="nombre" 
            class="form-input" 
            placeholder="Ingresa tu nombre de aventurero..."
            required
          >
        </div>
        
        <div class="form-group">
          <label class="form-label" for="correo">📧 Correo Mágico</label>
          <input 
            type="email" 
            id="correo" 
            name="correo" 
            class="form-input" 
            placeholder="tu-correo@aventura.com"
            required
          >
        </div>
        
        <div class="form-group">
          <label class="form-label" for="wallet">💰 Dirección de Tesoro (Wallet)</label>
          <input 
            type="text" 
            id="wallet" 
            name="wallet" 
            class="form-input" 
            placeholder="0x... (tu dirección Sui)"
            required
          >
        </div>
        
        <button type="submit" class="mario-button">
          ¡Reclamar Premio!
        </button>
      </form>
    </div>
  </div>
  
  <!-- Success Message -->
  <div class="success-message" id="successMessage">
    <h2>🌟 ¡Registro Exitoso! 🌟</h2>
    <p>Tu aventura en SuiLatam ha comenzado.<br>¡Prepárate para el premio!</p>
  </div>

  <script>
    // Form submission
    document.getElementById('secretForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Get form data
      const formData = {
        nombre: document.getElementById('nombre').value,
        correo: document.getElementById('correo').value,
        wallet: document.getElementById('wallet').value,
        timestamp: new Date().toISOString(),
        source: 'premio-secreto-qr'
      };
      
      // Create sparkle effect
      createMarioSparkles();
      
      // Show success message
      setTimeout(() => {
        document.getElementById('successMessage').style.display = 'block';
        
        // Here you would normally send data to your backend
        console.log('Premio Secreto Data:', formData);
        
        // Hide success message after 3 seconds
        setTimeout(() => {
          document.getElementById('successMessage').style.display = 'none';
          document.getElementById('secretForm').reset();
        }, 3000);
      }, 1000);
    });
    
    // Mario sparkle effect
    function createMarioSparkles() {
      const colors = ['⭐', '🌟', '✨', '💫', '🪙'];
      
      for (let i = 0; i < 20; i++) {
        const sparkle = document.createElement('div');
        sparkle.textContent = colors[Math.floor(Math.random() * colors.length)];
        sparkle.style.cssText = `
          position: fixed;
          font-size: 2rem;
          pointer-events: none;
          z-index: 9999;
          left: ${Math.random() * window.innerWidth}px;
          top: ${Math.random() * window.innerHeight}px;
        `;
        
        document.body.appendChild(sparkle);
        
        sparkle.animate([
          { 
            transform: 'translateY(0) scale(1) rotate(0deg)', 
            opacity: 1 
          },
          { 
            transform: 'translateY(-100px) scale(0) rotate(360deg)', 
            opacity: 0 
          }
        ], {
          duration: 1500,
          easing: 'ease-out'
        }).onfinish = () => sparkle.remove();
      }
    }
    
    // Add Mario sound effects (optional)
    function playMarioSound() {
      // You can add actual audio here if needed
      console.log('🎵 Mario sound effect!');
    }
    
    // Enhanced input interactions
    document.querySelectorAll('.form-input').forEach(input => {
      input.addEventListener('focus', () => {
        input.style.borderColor = '#ffd700';
        input.style.transform = 'scale(1.02)';
      });
      
      input.addEventListener('blur', () => {
        input.style.borderColor = 'rgba(255, 215, 0, 0.3)';
        input.style.transform = 'scale(1)';
      });
    });
  </script>
</body>
</html>
