<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Dashboard Sorteo SuiLatam | Panel de Control</title>
  <meta content="width=device-width, initial-scale=1" name="viewport">
  <meta name="description" content="Dashboard para gestionar y realizar sorteos de SuiLatam en tiempo real">
  
  <!-- Favicon -->
  <link href="https://res.cloudinary.com/das1ozwma/image/upload/v1748645630/WhatsApp_Image_2025-05-30_at_19.28.29-removebg-preview_w20ozk.png" rel="shortcut icon" type="image/png" sizes="32x32">
  
  <!-- CSS -->
  <link href="css/suilatam.css" rel="stylesheet" type="text/css">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', sans-serif;
    }
    
    .dashboard-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }
    
    .dashboard-header {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(79, 142, 224, 0.3);
      text-align: center;
    }
    
    .dashboard-title {
      color: #4F8EE0;
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }
    
    .dashboard-subtitle {
      color: #a0aec0;
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .stat-card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid rgba(79, 142, 224, 0.3);
      text-align: center;
      transition: transform 0.2s ease;
    }
    
    .stat-card:hover {
      transform: translateY(-2px);
    }
    
    .stat-number {
      font-size: 2.5rem;
      font-weight: 700;
      color: #4F8EE0;
      margin-bottom: 0.5rem;
    }
    
    .stat-label {
      color: #a0aec0;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .main-content {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 2rem;
    }
    
    .participants-section {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      border: 1px solid rgba(79, 142, 224, 0.3);
      overflow: hidden;
    }
    
    .section-header {
      background: rgba(79, 142, 224, 0.1);
      padding: 1.5rem 2rem;
      border-bottom: 1px solid rgba(79, 142, 224, 0.2);
    }
    
    .section-title {
      color: #4F8EE0;
      font-size: 1.3rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .participants-list {
      padding: 1rem;
      max-height: 500px;
      overflow-y: auto;
    }
    
    .participant-item {
      background: rgba(30, 41, 59, 0.5);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      border-left: 3px solid #4F8EE0;
      transition: all 0.2s ease;
    }
    
    .participant-item:hover {
      background: rgba(30, 41, 59, 0.8);
      transform: translateX(3px);
    }
    
    .participant-name {
      color: #e2e8f0;
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 0.25rem;
    }
    
    .participant-details {
      color: #94a3b8;
      font-size: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    
    .sorteo-section {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    
    .sorteo-card {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 16px;
      padding: 2rem;
      border: 1px solid rgba(79, 142, 224, 0.3);
      text-align: center;
    }
    
    .sorteo-button {
      width: 100%;
      background: linear-gradient(135deg, #4F8EE0, #3b82f6);
      border: none;
      border-radius: 12px;
      padding: 1.5rem;
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 2rem;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }
    
    .sorteo-button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(59, 130, 246, 0.5);
    }
    
    .sorteo-button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    .winner-display {
      background: linear-gradient(135deg, #10b981, #059669);
      border-radius: 12px;
      padding: 2rem;
      margin-top: 1rem;
      display: none;
      animation: slideInUp 0.5s ease-out;
    }
    
    .winner-crown {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: bounce 1s infinite;
    }
    
    .winner-name {
      font-size: 1.8rem;
      font-weight: 700;
      color: white;
      margin-bottom: 0.5rem;
    }
    
    .winner-details {
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.9rem;
    }
    
    .action-buttons {
      display: grid;
      gap: 1rem;
    }
    
    .action-btn {
      background: rgba(79, 142, 224, 0.1);
      border: 1px solid rgba(79, 142, 224, 0.3);
      border-radius: 8px;
      padding: 1rem;
      color: #4F8EE0;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }
    
    .action-btn:hover {
      background: rgba(79, 142, 224, 0.2);
      transform: translateY(-1px);
    }
    
    .link-section {
      background: rgba(15, 23, 42, 0.9);
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid rgba(79, 142, 224, 0.3);
    }
    
    .link-input {
      width: 100%;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid rgba(79, 142, 224, 0.3);
      border-radius: 6px;
      padding: 0.75rem;
      color: #e2e8f0;
      font-size: 0.9rem;
      margin-bottom: 1rem;
      box-sizing: border-box;
    }
    
    .copy-btn {
      width: 100%;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 6px;
      padding: 0.75rem;
      color: #22c55e;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .copy-btn:hover {
      background: rgba(34, 197, 94, 0.2);
    }
    
    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes bounce {
      0%, 20%, 60%, 100% { transform: translateY(0); }
      40% { transform: translateY(-10px); }
      80% { transform: translateY(-5px); }
    }
    
    .spinning {
      animation: spin 2s linear infinite;
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    @media (max-width: 1024px) {
      .main-content {
        grid-template-columns: 1fr;
      }
      
      .dashboard-container {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <div class="dashboard-header">
      <h1 class="dashboard-title">
        <i class="fas fa-trophy"></i>
        Dashboard Sorteo SuiLatam
      </h1>
      <p class="dashboard-subtitle">Panel de control para gestionar sorteos en tiempo real</p>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number" id="total-participants">0</div>
          <div class="stat-label">Participantes</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="total-today">0</div>
          <div class="stat-label">Hoy</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="total-pending">0</div>
          <div class="stat-label">Pendientes</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="total-winners">0</div>
          <div class="stat-label">Ganadores</div>
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="participants-section">
        <div class="section-header">
          <h2 class="section-title">
            <i class="fas fa-users"></i>
            Participantes en Tiempo Real
          </h2>
        </div>
        <div class="participants-list" id="participants-list">
          <!-- Los participantes aparecerán aquí -->
        </div>
      </div>

      <div class="sorteo-section">
        <div class="sorteo-card">
          <h3 style="color: #4F8EE0; margin-bottom: 1rem;">
            <i class="fas fa-dice"></i>
            Realizar Sorteo
          </h3>
          
          <button class="sorteo-button" id="sorteo-btn">
            <i class="fas fa-play"></i>
            Iniciar Sorteo
          </button>
          
          <div class="winner-display" id="winner-display">
            <div class="winner-crown">👑</div>
            <div class="winner-name" id="winner-name"></div>
            <div class="winner-details" id="winner-details"></div>
          </div>
        </div>

        <div class="sorteo-card">
          <h3 style="color: #4F8EE0; margin-bottom: 1rem;">
            <i class="fas fa-link"></i>
            Link de Registro
          </h3>
          
          <div class="link-section">
            <input 
              type="text" 
              class="link-input" 
              id="registro-link" 
              value="https://altobysuals.github.io/suilatam/registro-sorteo.html"
              readonly
            >
            <button class="copy-btn" id="copy-link-btn">
              <i class="fas fa-copy"></i>
              Copiar Link
            </button>
          </div>
        </div>

        <div class="sorteo-card">
          <h3 style="color: #4F8EE0; margin-bottom: 1rem;">
            <i class="fas fa-tools"></i>
            Acciones
          </h3>
          
          <div class="action-buttons">
            <button class="action-btn" id="export-btn">
              <i class="fas fa-download"></i>
              Exportar Lista
            </button>
            <button class="action-btn" id="clear-btn">
              <i class="fas fa-trash"></i>
              Limpiar Datos
            </button>
            <button class="action-btn" id="screenshot-btn">
              <i class="fas fa-camera"></i>
              Tomar Captura
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/contest-data.js"></script>
  <script src="js/supabase-data.js"></script>

  <script>
    // Inicializar sistema de datos
    const dataManager = new SupabaseDataManager();
    let participants = [];
    let isRaffleRunning = false;

    // Actualizar datos al cargar
    function updateDashboard() {
        participants = dataManager.getParticipants();
        updateStats();
        updateParticipantsList();
    }

    // Actualizar estadísticas
    function updateStats() {
        const totalCount = participants.length;
        const todayCount = participants.filter(p => {
            const today = new Date().toDateString();
            const participantDate = new Date(p.rawTimestamp || p.timestamp).toDateString();
            return participantDate === today;
        }).length;
        
        const uniqueEmails = new Set(participants.map(p => p.email)).size;
        const uniqueWallets = new Set(participants.map(p => p.wallet)).size;
        
        // Obtener dispositivos
        const devices = participants.reduce((acc, p) => {
            acc[p.device || 'Desconocido'] = (acc[p.device || 'Desconocido'] || 0) + 1;
            return acc;
        }, {});
        
        // Obtener navegadores
        const browsers = participants.reduce((acc, p) => {
            acc[p.browser || 'Desconocido'] = (acc[p.browser || 'Desconocido'] || 0) + 1;
            return acc;
        }, {});
        
        // Actualizar DOM
        document.getElementById('total-participants').textContent = totalCount;
        document.getElementById('today-participants').textContent = todayCount;
        document.getElementById('unique-emails').textContent = uniqueEmails;
        document.getElementById('unique-wallets').textContent = uniqueWallets;
        
        // Actualizar últimos dispositivos
        const devicesList = Object.entries(devices)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 3)
            .map(([device, count]) => `${device}: ${count}`)
            .join(', ') || 'Sin datos';
        
        const browsersInfo = Object.entries(browsers)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 2)
            .map(([browser, count]) => `${browser}: ${count}`)
            .join(', ') || 'Sin datos';
        
        document.getElementById('devices-info').textContent = devicesList;
        document.getElementById('browsers-info').textContent = browsersInfo;
        
        // Actualizar último registro
        if (participants.length > 0) {
            const lastParticipant = participants[participants.length - 1];
            document.getElementById('last-registration').textContent = 
                `${lastParticipant.name} - ${lastParticipant.timestamp}`;
        } else {
            document.getElementById('last-registration').textContent = 'Sin registros aún';
        }
    }

    // Actualizar lista de participantes
    function updateParticipantsList() {
        const container = document.getElementById('participants-container');
        
        if (participants.length === 0) {
            container.innerHTML = `
                <div class="no-participants">
                    <i class="fas fa-users" style="font-size: 3rem; color: #94a3b8; margin-bottom: 1rem;"></i>
                    <h3>Sin participantes aún</h3>
                    <p>Los participantes aparecerán aquí en tiempo real</p>
                    <p style="margin-top: 1rem; color: #64748b;">
                        <strong>Enlaces de registro:</strong><br>
                        Local: <code>file:///.../registro-sorteo.html</code><br>
                        Vercel: <code>https://suilatam.vercel.app/registro-sorteo.html</code>
                    </p>
                </div>
            `;
            return;
        }
        
        const participantsList = participants
            .sort((a, b) => new Date(b.rawTimestamp || b.timestamp) - new Date(a.rawTimestamp || a.timestamp))
            .map(participant => {
                const shortWallet = participant.wallet.substring(0, 8) + '...' + participant.wallet.substring(-4);
                const deviceIcon = participant.device === 'Móvil' ? 'fa-mobile-alt' : 
                                  participant.device === 'Tablet' ? 'fa-tablet-alt' : 'fa-desktop';
                
                return `
                    <div class="participant-card" data-id="${participant.id}">
                        <div class="participant-header">
                            <div class="participant-info">
                                <h4>${participant.name}</h4>
                                <p class="participant-email">${participant.email}</p>
                            </div>
                            <div class="participant-meta">
                                <span class="meta-tag">
                                    <i class="fas ${deviceIcon}"></i>
                                    ${participant.device || 'Desktop'}
                                </span>
                                <span class="meta-tag">
                                    <i class="fas fa-globe"></i>
                                    ${participant.browser || 'Chrome'}
                                </span>
                            </div>
                        </div>
                        
                        <div class="participant-details">
                            <div class="detail-row">
                                <i class="fas fa-wallet"></i>
                                <span class="wallet-address">${shortWallet}</span>
                                <button onclick="copyToClipboard('${participant.wallet}')" class="copy-btn" title="Copiar wallet completa">
                                    <i class="fas fa-copy"></i>
                                </button>
                            </div>
                            
                            <div class="detail-row">
                                <i class="fas fa-clock"></i>
                                <span>${participant.timestamp}</span>
                            </div>
                            
                            <div class="detail-row">
                                <i class="fas fa-fingerprint"></i>
                                <span class="participant-id">ID: ${participant.id}</span>
                            </div>
                            
                            ${participant.source ? `
                            <div class="detail-row">
                                <i class="fas fa-server"></i>
                                <span class="source-tag ${participant.source === 'local' ? 'source-local' : 'source-vercel'}">
                                    ${participant.source === 'local' ? 'Local' : 'Vercel'}
                                </span>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            })
            .join('');
        
        container.innerHTML = participantsList;
    }

    // Ejecutar sorteo
    async function runRaffle() {
        if (isRaffleRunning) return;
        
        if (participants.length === 0) {
            alert('❌ No hay participantes para sortear');
            return;
        }
        
        isRaffleRunning = true;
        const raffleBtn = document.getElementById('raffle-btn');
        const winnerContainer = document.getElementById('winner-container');
        
        // Cambiar botón
        raffleBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sorteando...';
        raffleBtn.disabled = true;
        
        // Limpiar ganador anterior
        winnerContainer.innerHTML = '';
        
        // Animación de sorteo
        const animationContainer = document.createElement('div');
        animationContainer.className = 'raffle-animation';
        animationContainer.innerHTML = `
            <div class="raffle-wheel">
                <div class="raffle-spinner">🎯</div>
            </div>
            <div class="raffle-text">
                <h3>🎲 Seleccionando ganador...</h3>
                <p>Entre ${participants.length} participantes</p>
            </div>
        `;
        
        winnerContainer.appendChild(animationContainer);
        
        // Esperar 3 segundos para efecto dramático
        await new Promise(resolve => setTimeout(resolve, 3000));
        
        // Seleccionar ganador
        const winner = dataManager.drawWinner();
        
        if (winner) {
            // Mostrar ganador
            animationContainer.innerHTML = `
                <div class="winner-announcement">
                    <div class="winner-trophy">🏆</div>
                    <h2>¡GANADOR!</h2>
                    <div class="winner-details">
                        <h3>${winner.name}</h3>
                        <p class="winner-email">${winner.email}</p>
                        <div class="winner-wallet">
                            <i class="fas fa-wallet"></i>
                            ${winner.wallet.substring(0, 15)}...
                        </div>
                        <div class="winner-meta">
                            <span><i class="fas fa-calendar"></i> ${winner.timestamp}</span>
                            <span><i class="fas fa-hashtag"></i> ID: ${winner.id}</span>
                        </div>
                    </div>
                    <div class="winner-actions">
                        <button onclick="copyWinnerInfo('${winner.id}')" class="action-btn">
                            <i class="fas fa-copy"></i> Copiar Info
                        </button>
                        <button onclick="takeScreenshot()" class="action-btn">
                            <i class="fas fa-camera"></i> Captura
                        </button>
                        <button onclick="clearWinner()" class="action-btn secondary">
                            <i class="fas fa-refresh"></i> Nuevo Sorteo
                        </button>
                    </div>
                </div>
            `;
            
            // Confetti effect
            createConfetti();
        }
        
        // Restaurar botón
        raffleBtn.innerHTML = '<i class="fas fa-dice"></i> Realizar Sorteo';
        raffleBtn.disabled = false;
        isRaffleRunning = false;
    }

    // Funciones de utilidad
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            showNotification('📋 Copiado al portapapeles', 'success');
        }).catch(() => {
            showNotification('❌ Error al copiar', 'error');
        });
    }

    function copyWinnerInfo(winnerId) {
        const winner = participants.find(p => p.id === winnerId);
        if (winner) {
            const info = `🏆 GANADOR SORTEO SUILATAM\n\nNombre: ${winner.name}\nEmail: ${winner.email}\nWallet: ${winner.wallet}\nFecha: ${winner.timestamp}\nID: ${winner.id}`;
            copyToClipboard(info);
        }
    }

    function clearWinner() {
        document.getElementById('winner-container').innerHTML = '';
    }

    function takeScreenshot() {
        // Usar html2canvas si está disponible
        showNotification('📸 Función de captura en desarrollo', 'info');
    }

    function createConfetti() {
        for (let i = 0; i < 30; i++) {
            setTimeout(() => {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = ['#f59e0b', '#22c55e', '#3b82f6', '#ef4444'][Math.floor(Math.random() * 4)];
                confetti.innerHTML = ['🎉', '🎊', '⭐', '🌟'][Math.floor(Math.random() * 4)];
                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    if (document.body.contains(confetti)) {
                        document.body.removeChild(confetti);
                    }
                }, 3000);
            }, i * 100);
        }
    }

    function showNotification(message, type = 'info') {
        const notification = document.createElement('div');
        notification.className = `notification ${type}`;
        notification.textContent = message;
        
        const colors = {
            success: '#22c55e',
            error: '#ef4444',
            info: '#3b82f6',
            warning: '#f59e0b'
        };
        
        notification.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            background: ${colors[type] || colors.info};
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            z-index: 10000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
        `;
        
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.style.transform = 'translateX(0)';
        }, 100);
        
        setTimeout(() => {
            notification.style.transform = 'translateX(100%)';
            setTimeout(() => {
                if (document.body.contains(notification)) {
                    document.body.removeChild(notification);
                }
            }, 300);
        }, 3000);
    }

    // Event listeners
    document.getElementById('raffle-btn').addEventListener('click', runRaffle);

    document.getElementById('export-json').addEventListener('click', () => {
        dataManager.exportData('json');
    });

    document.getElementById('export-csv').addEventListener('click', () => {
        dataManager.exportData('csv');
    });

    document.getElementById('export-txt').addEventListener('click', () => {
        dataManager.exportData('txt');
    });

    document.getElementById('copy-data').addEventListener('click', () => {
        dataManager.exportData('copy');
    });

    document.getElementById('clear-data').addEventListener('click', () => {
        dataManager.clearAllData();
    });

    // Escuchar eventos de sincronización
    window.addEventListener('participantAdded', function(e) {
        showNotification('🎉 Nuevo participante registrado!', 'success');
        updateDashboard();
    });

    window.addEventListener('dataUpdated', function() {
        updateDashboard();
    });

    // Auto-actualizar cada 5 segundos
    setInterval(updateDashboard, 5000);

    // Inicializar al cargar
    document.addEventListener('DOMContentLoaded', function() {
        updateDashboard();
        console.log('✅ Dashboard de sorteo sincronizado inicializado');
