<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Sorteo SuiLatam - SIMPLE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: white;
      padding: 20px;
    }
    
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: #2a2a2a;
      padding: 30px;
      border-radius: 10px;
    }
    
    h1 {
      text-align: center;
      color: #4F8EE0;
      margin-bottom: 30px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 5px;
      color: #aaa;
    }
    
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #444;
      background: #333;
      color: white;
      border-radius: 5px;
      font-size: 16px;
    }
    
    button {
      width: 100%;
      padding: 15px;
      background: #4F8EE0;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 18px;
      cursor: pointer;
    }
    
    button:hover {
      background: #3a7bc8;
    }
    
    .success {
      background: green;
      color: white;
      padding: 20px;
      border-radius: 5px;
      margin-top: 20px;
      text-align: center;
      display: none;
    }
    
    .participants {
      margin-top: 30px;
      padding: 20px;
      background: #333;
      border-radius: 5px;
    }
    
    .participant {
      padding: 10px;
      margin: 5px 0;
      background: #444;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 Registro Sorteo SuiLatam</h1>
    
    <form id="simpleForm">
      <div class="form-group">
        <label>Nombre:</label>
        <input type="text" id="nombre" placeholder="Tu nombre" required>
      </div>
      
      <div class="form-group">
        <label>Email (opcional):</label>
        <input type="email" id="email" placeholder="email@ejemplo.com">
      </div>
      
      <div class="form-group">
        <label>Wallet (opcional):</label>
        <input type="text" id="wallet" placeholder="0x...">
      </div>
      
      <button type="submit">REGISTRARME</button>
    </form>
    
    <div id="success" class="success">
      ¡REGISTRO EXITOSO! ✅
    </div>
    
    <div class="participants">
      <h3>Participantes Registrados:</h3>
      <div id="participantsList"></div>
    </div>
  </div>

  <script>
    // Obtener datos guardados
    function getParticipants() {
      const data = localStorage.getItem('suilatam_participants');
      return data ? JSON.parse(data) : [];
    }
    
    // Guardar participante
    function saveParticipant(participant) {
      const participants = getParticipants();
      participants.push(participant);
      localStorage.setItem('suilatam_participants', JSON.stringify(participants));
    }
    
    // Mostrar participantes
    function showParticipants() {
      const participants = getParticipants();
      const listDiv = document.getElementById('participantsList');
      
      if (participants.length === 0) {
        listDiv.innerHTML = '<p>No hay participantes aún</p>';
        return;
      }
      
      listDiv.innerHTML = participants.map((p, i) => `
        <div class="participant">
          ${i + 1}. ${p.name} - ${p.email || 'Sin email'} - ${p.wallet || 'Sin wallet'}
        </div>
      `).join('');
    }
    
    // Manejar el formulario
    document.getElementById('simpleForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const nombre = document.getElementById('nombre').value;
      const email = document.getElementById('email').value || 'no-email@test.com';
      const wallet = document.getElementById('wallet').value || '0x' + Math.random().toString(36).substring(7);
      
      const participant = {
        id: Date.now(),
        name: nombre,
        email: email,
        wallet: wallet,
        timestamp: new Date().toLocaleString()
      };
      
      // Guardar
      saveParticipant(participant);
      
      // Mostrar éxito
      document.getElementById('success').style.display = 'block';
      
      // Limpiar form
      this.reset();
      
      // Actualizar lista
      showParticipants();
      
      // Ocultar mensaje después de 3 segundos
      setTimeout(() => {
        document.getElementById('success').style.display = 'none';
      }, 3000);
    });
    
    // Cargar participantes al inicio
    showParticipants();
    
    // Actualizar cada 2 segundos
    setInterval(showParticipants, 2000);
  </script>
</body>
</html>
